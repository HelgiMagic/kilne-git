buildscript {
  repositories {
    google()
    mavenCentral()
    maven { url 'https://www.jitpack.io' }
  }
}

apply plugin: 'com.android.library'
apply plugin: 'org.jetbrains.kotlin.android'

// Nitrogen autolinking: registers the C++/Kotlin HybridObject bindings.
// The file is generated by `npx nitrogen` into ../nitrogen/generated/android/.
apply from: '../nitrogen/generated/android/KilneGitNative+autolinking.gradle'

android {
  namespace "com.kilne.git"
  compileSdkVersion safeExtGet("compileSdkVersion", 35)

  defaultConfig {
    minSdkVersion safeExtGet("minSdkVersion", 24)
    targetSdkVersion safeExtGet("targetSdkVersion", 35)

    externalNativeBuild {
      cmake {
        // C++20 needed for our HybridObject + fmt.
        cppFlags "-std=c++20", "-stdlib=libc++", "-fexceptions", "-frtti"
        // Speed up CI builds by limiting ABIs to the ones you actually ship.
        abiFilters "arm64-v8a", "armeabi-v7a", "x86_64"
        arguments "-DANDROID_STL=c++_shared"
      }
    }
  }

  externalNativeBuild {
    cmake {
      path "src/main/cpp/CMakeLists.txt"
    }
  }

  compileOptions {
    sourceCompatibility JavaVersion.VERSION_17
    targetCompatibility JavaVersion.VERSION_17
  }

  kotlinOptions {
    jvmTarget = "17"
  }

  sourceSets {
    main {
      // Generated Kotlin (HybridGitSpec.kt, registerHybridObjects.kt, ...) lives
      // under ../nitrogen/generated/android/. The autolinking gradle script wires
      // the right src dirs but make sure CMake is also aware.
      java.srcDirs += ['../nitrogen/generated/android/kotlin']
    }
  }

  packagingOptions {
    // libgit2 brings no JNI itself; only our own libKilneGitNative.so is packaged.
    excludes = ['META-INF/androidx.versioning_versioning.versioning.version']
  }
}

private int safeExtGet(String prop, int fallback) {
  rootProject.ext.has(prop) ? rootProject.ext.get(prop) : fallback
}

dependencies {
  implementation "com.facebook.react:react-native:+"  // from node_modules
  implementation "com.facebook.fbjni:fbjni:0.7.0"
  // Nitro core runtime.
  implementation project(':react-native-nitro-modules')
}
