buildscript {
  repositories {
    google()
    mavenCentral()
    maven { url 'https://www.jitpack.io' }
  }
}

apply plugin: 'com.android.library'
apply plugin: 'org.jetbrains.kotlin.android'

// Nitrogen autolinking: registers the C++/Kotlin HybridObject bindings.
// The file is generated by `npx nitrogen` into ../nitrogen/generated/android/.
apply from: '../nitrogen/generated/android/KilneGitNative+autolinking.gradle'

// Must match react-native-nitro-modules (and expo run:android -PreactNativeArchitectures=…).
// Hardcoding arm64 while NitroModules only builds x86_64 leaves HybridObject symbols unresolved.
def reactNativeArchitectures() {
  def value = rootProject.getProperties().get("reactNativeArchitectures")
  return value ? value.split(",") : ["armeabi-v7a", "arm64-v8a", "x86_64"]
}

android {
  // Must not match the app package (com.kilne.git). Align with Nitrogen's
  // generated Kotlin package: com.margelo.nitro.{androidNamespace}.
  namespace "com.margelo.nitro.kilne.git"
  compileSdkVersion safeExtGet("compileSdkVersion", 35)

  defaultConfig {
    minSdkVersion safeExtGet("minSdkVersion", 24)
    targetSdkVersion safeExtGet("targetSdkVersion", 35)

    externalNativeBuild {
      cmake {
        // C++20 needed for our HybridObject + fmt.
        cppFlags "-std=c++20", "-stdlib=libc++", "-fexceptions", "-frtti"
        abiFilters (*reactNativeArchitectures())
        arguments "-DANDROID_STL=c++_shared"
      }
    }
  }

  externalNativeBuild {
    cmake {
      // Nitro template: CMakeLists at android/ so ../nitrogen paths resolve.
      path "CMakeLists.txt"
    }
  }

  buildFeatures {
    // Required for find_package(fbjni / ReactAndroid / nitro-modules) in CMake.
    prefab true
  }

  compileOptions {
    sourceCompatibility JavaVersion.VERSION_17
    targetCompatibility JavaVersion.VERSION_17
  }

  kotlinOptions {
    jvmTarget = "17"
  }

  sourceSets {
    main {
      // Generated Kotlin (HybridGitSpec.kt, registerHybridObjects.kt, ...) lives
      // under ../nitrogen/generated/android/. The autolinking gradle script wires
      // the right src dirs but make sure CMake is also aware.
      java.srcDirs += ['../nitrogen/generated/android/kotlin']
    }
  }

  packagingOptions {
    // Prefer the copies shipped by RN / Nitro / fbjni AARs — don't embed dupes.
    excludes = [
      'META-INF/androidx.versioning_versioning.versioning.version',
      '**/libc++_shared.so',
      '**/libNitroModules.so',
      '**/libfbjni.so',
      '**/libjsi.so',
      '**/libreactnative.so',
    ]
  }
}

private int safeExtGet(String prop, int fallback) {
  rootProject.ext.has(prop) ? rootProject.ext.get(prop) : fallback
}

dependencies {
  implementation "com.facebook.react:react-native:+"  // from node_modules
  implementation "com.facebook.fbjni:fbjni:0.7.0"
  // Nitro core runtime.
  implementation project(':react-native-nitro-modules')
}
