# Flat node_modules (npm-like). Required on Windows: isolated .pnpm junctions
# resolve to paths past CMAKE_OBJECT_PATH_MAX and break NDK/CMake for
# nitro-modules / worklets / screens. Docs: https://pnpm.io/settings#nodelinker
# Note: pnpm 10+ ignores node-linker in .npmrc — settings live here.
nodeLinker: hoisted

# Disable supply-chain "wait N minutes after publish" gate (pnpm 11 default is 1440).
minimumReleaseAge: 0
